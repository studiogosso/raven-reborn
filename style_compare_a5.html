<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Style A5 - Multi-light + Dark Core Shadow</title>
<style>body{background:#0a0a0a;color:#fff;font-family:sans-serif;margin:0;padding:20px;text-align:center}
h1{color:#ffcc66;font-size:20px}.sub{color:#666;font-size:11px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;max-width:1200px;margin:0 auto}
.card{background:#0e0c08;border:1px solid #2a2010;border-radius:4px;overflow:hidden}
.card img{width:100%;cursor:zoom-in}</style></head><body>
<h1>A5: A2 + Bounce Light + Multi-Source + Dark Core Shadow</h1>
<div class="sub">A2の油絵ベースに反射光を強め、複数光源、影と光の境界を暗く。</div>
<div class="grid">
  <div class="card"><img src="sprites/ui/a5_rogue.png" onclick="window.open(this.src)"></div>
  <div class="card"><img src="sprites/ui/a5_boss.png" onclick="window.open(this.src)"></div>
  <div class="card"><img src="sprites/ui/a5_dagger.png" onclick="window.open(this.src)"></div>
</div></body></html>
