<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Style A3 - Sharp Contrast + Exaggerated</title>
<style>body{background:#0a0a16;color:#fff;font-family:sans-serif;margin:0;padding:20px;text-align:center}
h1{color:#ffcc66;font-size:22px}.sub{color:#666;font-size:12px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;max-width:1200px;margin:0 auto}
.card{background:#12122a;border:2px solid #2a1a4a;border-radius:12px;overflow:hidden}

<h1>Style A3: Sharp Contrast + Exaggeration</h1>
<div class="sub">パキッとした陰影 + 誇張されたプロポーション。ノワール×油絵×グラフィックノベル。</div>
<div class="grid">
  <div class="card"><img src="sprites/ui/a3_rogue.png" onclick="window.open(this.src)"></div>
  <div class="card"><img src="sprites/ui/a3_boss.png" onclick="window.open(this.src)"></div>
  <div class="card"><img src="sprites/ui/a3_dagger.png" onclick="window.open(this.src)"></div>
</div></body></html>
